name: Test Media Stack

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [package_updated]

jobs:
  test-stack:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Create placeholder secrets for validation
      run: |
        mkdir -p /tmp/dev-secrets
        for f in signing_secret.txt cf-api-token.txt cf-api-key.txt nginx-auth-api-key.txt \
          tinyauth-secret.txt tinyauth-google-client-secret.txt tinyauth-github-client-secret.txt \
          crowdsec-lapi-key.txt sudo-password.txt plex-token.txt mediafusion-secret-key.txt \
          mediaflow-proxy-api-password.txt realdebrid-api-key.txt realdebrid-2-api-key.txt \
          alldebrid-api-key.txt premiumize-api-key.txt debridlink-api-key.txt torbox-api-key.txt \
          offcloud-api-key.txt offcloud-password.txt tmdb-access-token.txt tmdb-api-key.txt \
          aiostreams-secret-key.txt aiostreams-addon-password.txt stremthru-store-auth.txt \
          stremthru-proxy-auth.txt stremthru-auth-admin.txt grafana-password.txt \
          grafana-secret-key.txt openai-api-key.txt firecrawl-api-key.txt anthropic-api-key.txt \
          openrouter-api-key.txt groq-api-key.txt deepseek-api-key.txt gemini-api-key.txt \
          mistral-api-key.txt perplexity-api-key.txt replicate-api-key.txt sambanova-api-key.txt \
          togetherai-api-key.txt hf-token.txt tavily-api-key.txt github-token.txt coolify-token.txt \
          goal-story-api-key.txt smithery-api-key.txt open-webui-secret-key.txt litellm-master-key.txt \
          brave-api-key.txt exa-api-key.txt glama-api-key.txt jina-api-key.txt kagi-api-key.txt \
          langchain-api-key.txt serpapi-api-key.txt search1api-key.txt upstage-api-key.txt \
          revid-api-key.txt riven-api-key.txt jellyfin-api-key.txt emby-api-key.txt \
          mdblist-api-key.txt listrr-api-key.txt trakt-api-key.txt jackett-api-key.txt \
          prowlarr-api-key.txt orionoid-api-key.txt warp-license-key.txt authentik-secret-key.txt \
          gmail-app-password.txt; do
          echo "ci-placeholder" > "/tmp/dev-secrets/$f"
        done
        mkdir -p ~/.docker && echo '{}' > ~/.docker/config.json

    - name: Validate Docker Compose configuration
      run: |
        env \
          DOMAIN=localhost TS_HOSTNAME=dev STACK_NAME=dev \
          SECRETS_PATH=/tmp/dev-secrets SECRETS_DIR=/tmp/dev-secrets \
          ROOT_DIR=. ROOT_PATH=. CONFIG_PATH=./volumes \
          CERTS_DIR=./certs CERTS_PATH=./certs \
          DATA_DIR=./data DATA_PATH=./data \
          SEARXNG_SECRET=ci REDIS_PASSWORD=ci SUDO_PASSWORD=ci \
          NGINX_AUTH_API_KEY=ci PROWLARR_API_KEY=ci REALDEBRID_TOKEN=ci \
          REALDEBRID_API_KEY=ci ACME_RESOLVER_EMAIL=ci@ci.test \
          CLOUDFLARE_EMAIL=ci@ci.test CLOUDFLARE_ZONE_ID=ci CF_ZONE_ID=ci \
          CF_API_KEY=ci CLOUDFLARE_DNS_API_TOKEN=ci CLOUDFLARE_ZONE_API_TOKEN=ci \
          TINYAUTH_GOOGLE_CLIENT_ID=ci TINYAUTH_GITHUB_CLIENT_ID=ci \
          TINYAUTH_SECRET=ci TINYAUTH_USERS=ci TINYAUTH_OAUTH_WHITELIST=ci \
          TINYAUTH_GOOGLE_CLIENT_SECRET=ci TINYAUTH_GITHUB_CLIENT_SECRET=ci \
          CROWDSEC_LAPI_KEY=ci CROWDSEC_MACHINE_ID=ci CROWDSEC_BOUNCER_ENABLED=false \
          AIOSTREAMS_SECRET_KEY=ci AIOSTREAMS_ADDON_PASSWORD=ci \
          STREMTHRU_PROXY_AUTH=ci STREMTHRU_STORE_AUTH=ci STREMTHRU_AUTH_ADMIN=ci \
          LITELLM_MASTER_KEY=ci FIRECRAWL_API_KEY=ci FIRECRAWL_BULL_AUTH_KEY=ci \
          MCPO_API_KEY=ci MCP_AUTH_TOKEN=ci OPEN_WEBUI_SECRET_KEY=ci \
          GF_SECURITY_ADMIN_PASSWORD=ci GRAFANA_PASSWORD=ci MEDIAFUSION_SECRET_KEY=ci \
          MEDIAFLOW_PROXY_API_PASSWORD=ci AUTOKUMA__KUMA__USERNAME=ci \
          AUTOKUMA__KUMA__PASSWORD=ci JACKETT_API_KEY=ci EXTERNAL_IP=127.0.0.1 \
          docker compose config --quiet
        echo "Docker Compose configuration is valid"

    - name: Validate compose service count
      run: |
        SERVICE_COUNT=$(env \
          DOMAIN=localhost TS_HOSTNAME=dev STACK_NAME=dev \
          SECRETS_PATH=/tmp/dev-secrets SECRETS_DIR=/tmp/dev-secrets \
          ROOT_DIR=. ROOT_PATH=. CONFIG_PATH=./volumes \
          CERTS_DIR=./certs CERTS_PATH=./certs \
          DATA_DIR=./data DATA_PATH=./data \
          SEARXNG_SECRET=ci REDIS_PASSWORD=ci SUDO_PASSWORD=ci \
          NGINX_AUTH_API_KEY=ci PROWLARR_API_KEY=ci REALDEBRID_TOKEN=ci \
          REALDEBRID_API_KEY=ci ACME_RESOLVER_EMAIL=ci@ci.test \
          CLOUDFLARE_EMAIL=ci@ci.test CLOUDFLARE_ZONE_ID=ci CF_ZONE_ID=ci \
          CF_API_KEY=ci CLOUDFLARE_DNS_API_TOKEN=ci CLOUDFLARE_ZONE_API_TOKEN=ci \
          TINYAUTH_GOOGLE_CLIENT_ID=ci TINYAUTH_GITHUB_CLIENT_ID=ci \
          TINYAUTH_SECRET=ci TINYAUTH_USERS=ci TINYAUTH_OAUTH_WHITELIST=ci \
          TINYAUTH_GOOGLE_CLIENT_SECRET=ci TINYAUTH_GITHUB_CLIENT_SECRET=ci \
          CROWDSEC_LAPI_KEY=ci CROWDSEC_MACHINE_ID=ci CROWDSEC_BOUNCER_ENABLED=false \
          AIOSTREAMS_SECRET_KEY=ci AIOSTREAMS_ADDON_PASSWORD=ci \
          STREMTHRU_PROXY_AUTH=ci STREMTHRU_STORE_AUTH=ci STREMTHRU_AUTH_ADMIN=ci \
          LITELLM_MASTER_KEY=ci FIRECRAWL_API_KEY=ci FIRECRAWL_BULL_AUTH_KEY=ci \
          MCPO_API_KEY=ci MCP_AUTH_TOKEN=ci OPEN_WEBUI_SECRET_KEY=ci \
          GF_SECURITY_ADMIN_PASSWORD=ci GRAFANA_PASSWORD=ci MEDIAFUSION_SECRET_KEY=ci \
          MEDIAFLOW_PROXY_API_PASSWORD=ci AUTOKUMA__KUMA__USERNAME=ci \
          AUTOKUMA__KUMA__PASSWORD=ci JACKETT_API_KEY=ci EXTERNAL_IP=127.0.0.1 \
          docker compose config --services | wc -l)
        echo "Found $SERVICE_COUNT services in compose configuration"
        if [ "$SERVICE_COUNT" -lt 5 ]; then
          echo "::error::Expected at least 5 services, found $SERVICE_COUNT"
          exit 1
        fi