      # Advanced: Override Jackettio hostname/port/protocol (similar to Comet).
      # FORCE_JACKETTIO_HOSTNAME: 
      # FORCE_JACKETTIO_PORT: 
      # FORCE_JACKETTIO_PROTOCOL: 

