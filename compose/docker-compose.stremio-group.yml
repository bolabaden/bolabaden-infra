          "LogLevel": "DEBUG",
          "mainOpt": {
            "ExtraFlags": [
              "--cutoff-mode=cautious",
              "--network-mode",
              "--config=/config/rclone/rclone.conf",
              "--log-level=DEBUG",
              "--log-file=/config/rclone/rclone.log"
            ],
            "LogLevel": "DEBUG",
            "MultiThreadStreams": 0,
            "TPSLimit": 12,
            "Transfers": 8
          },
          "mountOpt": {
            "AllowNonEmpty": true,
            "AllowOther": true,
            "DirPerms": "0777",
            "ExtraFlags": [
              "--cache-dir=/mnt/remote/cache/alldebrid"
            ],
            "FilePerms": "0666",
            "VolumeName": "AllDebrid"
          },
          "vfsOpt": {
            "BufferSize": "128M",
            "CacheMaxAge": "1h",
            "CacheMaxSize": "100G",
            "CacheMode": "full",
            "ChunkSize": "128M",
            "ChunkSizeLimit": "0",
            "DirCacheTime": "160h",
            "ExtraOptions": [],
            "ReadAhead": "0"
          }
        }
      ]
#        {
#          "fs": "zurg:",
